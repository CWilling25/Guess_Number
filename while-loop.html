<!-- 模态框 -->
<div id="notesModal" class="modal-overlay">
    <div class="notes-board">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/edit/closebrackets.min.js"></script>
<script src="js/python-sim.js"></script>
<script src="js/codemirror-editor.js"></script>
<script src="js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const code = `# while循环练习: 输入0退出循环
while True:
    num = int(input("请输入数字(输入0退出): "))
    if num == 0:
        print("退出循环")
        break
    else:
        print(f"你输入了 {num}，继续循环")
print("程序结束")`;
    
    const container = document.getElementById('whileEditor');
    if (container) {
        createCodeMirrorEditor(container, code, "while循环示例 | Python(python3)");
    }

    // 监听运行按钮，延迟显示提示
const checkInterval = setInterval(() => {
    const runBtn = document.querySelector('.run-btn');
    if (runBtn) {
        clearInterval(checkInterval);
        runBtn.addEventListener('click', () => {
            setTimeout(() => {
                const hint = document.querySelector('.hint');
                if (hint) hint.classList.add('visible');
            }, 2000);
        });
    }
}, 100);
});
</script>
</body>
