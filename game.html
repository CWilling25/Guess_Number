            <div class="ai-key-hint"><i class="fas fa-key"></i>DeepSeek模型</div>
            <button id="askAiBtn" class="ask-ai-btn"><i class="fas fa-paper-plane"></i> 向AI提问</button>
        </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/addon/edit/closebrackets.min.js"></script>
<script src="js/python-sim.js"></script>
<script src="js/codemirror-editor.js"></script>
<script src="js/common.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const code = `import random
answer = random.randint(1, 100)
count = 0
print("==== 完整猜数字游戏 ====")
while True:
    guess = int(input("请输入1-100之间的数字: "))
    count = count + 1
    if guess > answer:
        print("猜大了")
    elif guess < answer:
        print("猜小了")
    else:
        print(f"恭喜猜对了！共用了{count}次")
        break
print("游戏结束")`;
    
    const container = document.getElementById('gameEditor');
    if (container) {
        createCodeMirrorEditor(container, code, "完整游戏 | Python(python3)");
    }

    // 监听运行按钮，延迟显示提示
const checkInterval = setInterval(() => {
    const runBtn = document.querySelector('.run-btn');
    if (runBtn) {
        clearInterval(checkInterval);
        runBtn.addEventListener('click', () => {
            setTimeout(() => {
                const hint = document.querySelector('.hint');
                if (hint) hint.classList.add('visible');
            }, 2000);
        });
    }
}, 100);
});
</script>
