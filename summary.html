<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>总结复盘 · Python while循环</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
    <div class="progress-section">
        <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
        <div class="progress-text">5 / 5</div>
    </div>
    <div class="nav-bar">
        <div class="nav-left">
            <a href="index.html" class="icon-btn"><i class="fas fa-home"></i></a>
            <span class="page-badge">总结复盘</span>
        </div>
        <div class="right-actions">
            <div class="icon-btn" id="aiIconBtn"><i class="fas fa-robot"></i></div>
            <div class="icon-btn" id="noteIconBtn"><i class="fas fa-book-open"></i></div>
        </div>
    </div>
    <div class="view">
        <div class="title">📝 复盘总结</div>
        
        <div class="simple-text" style="font-size: 1.2rem;"><strong>⚠️ 常见易错点：</strong></div>
        <div class="simple-text" style="font-size: 1.2rem;">• while 循环缺少 break → 无限循环</div>
        <div class="simple-text" style="font-size: 1.2rem;">• random 模块未导入 → NameError</div>
        <div class="simple-text" style="font-size: 1.2rem;">• 缩进错误 → IndentationError</div>
        <div class="simple-text" style="font-size: 1.2rem;">• input 类型转换异常 → ValueError</div>

        <div class="simple-text" style="margin-top: 20px; font-size: 1.2rem;">
            <strong>🎯 核心知识点：</strong><br>
            循环自动处理重复任务，猜数字游戏完整实现了 while 循环 + break 的经典应用。
        </div>

        <div class="hint"  style="font-size: 1.2rem;">
            🚀 课后优化建议：<br>
            • 增加难度等级（不同范围）<br>
            • 记录历史最佳成绩<br>
            • 添加提示次数统计
        </div>

        <div class="page-nav">
            <a href="game.html" class="nav-btn"><i class="fas fa-chevron-left"></i></a>
            <a href="practice.html" class="nav-btn">前往练习场 →</a>
            <a href="index.html" class="nav-btn">返回目录 →</a>
        </div>

        <div style="margin-top: 20px; text-align: right;">
            <button id="downloadNotesSummaryBtn" class="download-note-btn">
                <i class="fas fa-download"></i> 永久保存笔记 (下载)
            </button>
        </div>
    </div>
</div>

<!-- 笔记模态框 -->
<div id="notesModal" class="modal-overlay">
    <div class="notes-board">
        <div class="notes-header"><h3><i class="fas fa-chalkboard"></i> 学习笔记</h3><button class="close-modal" id="closeNotesBtn">&times;</button></div>
        <div class="notes-body"><textarea id="notesContent" class="notes-textarea" placeholder="📝 记录你的学习心得、代码要点..."></textarea></div>
        <div class="notes-footer"><button class="save-note-btn" id="saveNotesBtn"><i class="fas fa-save"></i> 保存笔记</button></div>
    </div>
</div>

<!-- AI助手模态框 -->
<div id="aiModal" class="modal-overlay">
    <div class="ai-board">
        <div class="ai-header"><h3><i class="fas fa-brain"></i> AI 编程助手</h3><button class="close-modal" id="closeAiBtn">&times;</button></div>
        <div class="ai-body">
            <div id="aiResponseArea" class="ai-response-area">✨ 输入Python问题，获取智能解答～</div>
            <textarea id="aiQuestionInput" class="ai-question-input" rows="3" placeholder="例如：while循环的break怎么用？"></textarea>
        </div>
        <div class="ai-footer">
            <div class="ai-key-hint"><i class="fas fa-key"></i>DeepSeek模型</div>
            <button id="askAiBtn" class="ask-ai-btn"><i class="fas fa-paper-plane"></i> 向AI提问</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="js/common.js"></script>
</body>
</html>
